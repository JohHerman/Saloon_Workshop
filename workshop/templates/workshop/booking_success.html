<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Confirmed - éclat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&family=Playfair+Display:ital,wght@0,400..700;1,400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #fff9fc;
            font-family: "Quicksand", sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .success-card {
            background: white;
            border-radius: 48px;
            padding: 3rem;
            text-align: center;
            max-width: 500px;
            margin: 2rem;
            box-shadow: 0 25px 40px -25px rgba(201, 139, 176, 0.3);
            border: 2px solid #ffe4f0;
        }
        .success-icon {
            font-size: 4rem;
            color: #c48ab8;
            margin-bottom: 1rem;
        }
        h1 {
            font-family: "Playfair Display", serif;
            color: #8b5f7c;
            margin-bottom: 1rem;
        }
        p {
            color: #b68ba6;
            margin-bottom: 2rem;
        }
        .btn {
            display: inline-block;
            background: #d9b0d1;
            color: white;
            padding: 0.8rem 2rem;
            text-decoration: none;
            border-radius: 60px;
            transition: 0.2s;
        }
        .btn:hover {
            background: #c48ab8;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="success-card">
        <div class="success-icon">✨</div>
        <h1>Booking Request Sent!</h1>
        <p>Thank you for choosing éclat studio. We'll review your request and get back to you within 24 hours to confirm your appointment.</p>
        <a href="{% url 'home' %}" class="btn">Return to Home</a>
    </div>
</body>
</html>
